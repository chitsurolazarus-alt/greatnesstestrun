<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Detail | Christ or Nothing</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header id="mainHeader">
        <div class="container">
            <div class="navbar">
                <div class="logo-area">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Christ or Nothing Logo" class="logo-img" onerror="this.src='https://placehold.co/200x200/000000/FFFFFF?text=✝️'">
                    </a>
                    <a href="index.html" class="brand-name">CHRIST OR NOTHING</a>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html#tshirts">Tshirts</a></li>
                    <li><a href="index.html#hoodies">Hoodies</a></li>
                    <li><a href="index.html#sweaters">Sweaters</a></li>
                    <li><a href="index.html#headwear">Headwear</a></li>
                    <li><a href="index.html#contacts">Contact</a></li>
                </ul>
                <div class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Product Detail Section -->
        <div class="product-detail" id="productDetail" data-aos="fade-up" data-aos-duration="800"></div>

        <!-- Recommendations Section -->
        <section class="recommendations-section">
            <h2 class="section-title" data-aos="fade-right">You May Also Like</h2>
            <div class="recommendations-grid" id="recommendationsGrid" data-aos="fade-up" data-aos-delay="200"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <i class="fas fa-cross"></i>
                    <span>CHRIST OR NOTHING</span>
                </div>
                <p>© 2026 — Faith in every stitch</p>
                <p>Created by <a href="https://chitsurolazarus-alt.github.io/L.C-WebCrafts-Studios/" target="_blank">L.C WebCrafts Studios</a></p>
            </div>
        </div>
    </footer>

    <!-- Cart Modal -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-bag"></i> Your Cart</h3>
                <button id="closeCartBtn" class="close-modal">&times;</button>
            </div>
            <div id="cartItemsList" class="cart-items">
                <div class="empty-cart">Your cart is empty</div>
            </div>
            <div class="cart-footer">
                <div class="cart-total" id="cartTotalPrice">Total Items: 0</div>
                <div class="cart-total-amount" id="cartTotalAmount">Total: R 0</div>
                <button id="whatsappOrderBtn" class="whatsapp-btn">
                    <i class="fab fa-whatsapp"></i> Checkout via WhatsApp
                </button>
                <button id="clearCartBtn" class="clear-cart-btn">Clear Cart</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
